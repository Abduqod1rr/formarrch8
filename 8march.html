<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>8 March Greeting</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, sans-serif;
    text-align:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:500px;
}

h1{
    color:#e91e63;
}

p{
    color:#555;
    font-size:18px;
}

.lang-btn{
    margin-top:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#e91e63;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1 id="title">8-Mart Muborak! 🌸</h1>
    <p id="text">
        Aziz ayollar! Sizlarga baxt, sog‘lik va quvonch tilaymiz.
        Har bir kuningiz mehr va go‘zallikka to‘la bo‘lsin.
    </p>

    <div class="lang-btn">
        <button onclick="setLang('uz')">UZ</button>
        <button onclick="setLang('en')">EN</button>

        <pre>to all women from Abduqodir Raxmonov</pre>
    </div>
</div>

<script>
function setLang(lang){
    if(lang === "uz"){
        document.getElementById("title").innerText = "8-Mart Muborak! 🌸";
        document.getElementById("text").innerText =
        "Aziz ayollar! Sizlarga baxt, sog‘lik va quvonch tilaymiz. Har bir kuningiz mehr va go‘zallikka to‘la bo‘lsin.";
    }

    if(lang === "en"){
        document.getElementById("title").innerText = "Happy March 8! 🌸";
        document.getElementById("text").innerText =
        "To all women! We hope you have endless joy, health, and happiness. May you experience love, respect, and beauty every single day.";
    }
} 
</script>

</body>
</html>
